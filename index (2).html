<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iringa Kuku Market</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1b12;
color:white;
}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iringa Kuku Market</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        🐔
    </div>

    <h1>Iringa Kuku Market</h1>
    <p>Soko la kuku na mayai la kidigitali</p>
</header>

</body>
</html>
.logo{
font-size:30px;
font-weight:bold;
color:gold;
}

.hero{
padding:50px 20px;
text-align:center;
}

.hero h1{
font-size:35px;
color:gold;
margin-bottom:10px;
}

.hero p{
font-size:18px;
margin-bottom:20px;
}

.btn{
display:inline-block;
background:gold;
color:black;
padding:12px 25px;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

.categories{
padding:30px 20px;
}

.categories h2{
text-align:center;
margin-bottom:20px;
color:gold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.card{
background:#1b2b1d;
padding:20px;
border-radius:10px;
text-align:center;
border:1px solid gold;
}

footer{
text-align:center;
padding:20px;
border-top:2px solid gold;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<div class="logo">
    <img src="images/logo.png" alt="Iringa Kuku Market Logo">
</div>
</header>

<section class="hero">
<h1>Buy & Sell Poultry Across Tanzania</h1>
<p>Connect farmers and buyers in one marketplace.</p>

<a href="login.html" class="btn">Get Started</a>
</section>

<section class="categories">
<h2>Categories</h2>

<div class="grid">

<div class="card">🐔 Chickens</div>

<div class="card">🥚 Eggs</div>

<div class="card">🐣 Chicks</div>

<div class="card">🌽 Feed</div>

</div>
</section>

<footer>
© 2026 Iringa Kuku Market
</footer>

</body>
</html>
